name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      run: npm ci
    
    - name: Create debug keystore
      run: |
        cd android/app
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US" -storepass android -keypass android
        cd ../..
    
    - name: Clean build
      run: cd android && chmod +x gradlew && ./gradlew clean && cd ..
    
    - name: Build Debug APK
      run: cd android && ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
        compression-level: 0
    
    - name: Build Release APK (unsigned)
      run: cd android && ./gradlew assembleRelease
      continue-on-error: true
    
    - name: Upload Release APK (if exists)
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned-apk
        path: android/app/build/outputs/apk/release/*.apk
        compression-level: 0
      continue-on-error: true
